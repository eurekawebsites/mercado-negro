<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Martha Domínguez — Mercado Negro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.cdnfonts.com/css/bullina" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; background: #1a0a0e; }
    a { color: inherit; text-decoration: none; }

    :root {
      --burgundy:      #6B1A2A;
      --burgundy-dark: #4d1220;
      --burgundy-pale: #f5eaec;
      --gold:          #C9A84C;
      --gold-dark:     #a8863a;
      --white:         #ffffff;
      --dark:          #1a0a0e;
      --border:        #e8d0d4;
      --sans:          'Nunito', sans-serif;
      --title:         'Bullina', Arial, sans-serif;
    }

    body {
      background: var(--dark);
      min-height: 100vh;
      padding: 24px 20px 32px;
      font-family: var(--sans);
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .card {
      background: var(--white);
      color: var(--dark);
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      border-radius: 12px;
      border: 2px solid var(--border);
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    /* ── Top ── */
    .card-top {
      background: var(--burgundy);
      padding: 32px 28px 28px;
      text-align: center;
      position: relative;
    }

    .card-logo-wrap {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: var(--dark);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 2px solid rgba(201,168,76,0.4);
    }

    .card-logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-brand {
      font-family: var(--title);
      font-weight: 400;
      font-size: clamp(1.6rem, 6vw, 2.1rem);
      color: var(--white);
      margin-bottom: 8px;
      opacity: 0.95;
    }

    .card-name {
      font-family: var(--sans);
      font-weight: 700;
      font-size: clamp(0.9rem, 3.5vw, 1.1rem);
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .card-tagline {
      font-family: var(--sans);
      font-size: 0.82rem;
      color: rgba(255,255,255,0.75);
      line-height: 1.4;
    }

    /* ── Strip ── */
    .card-strip {
      background: var(--gold);
      padding: 10px 20px;
      text-align: center;
      font-family: var(--sans);
      font-weight: 400;
      font-size: 0.62rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dark);
    }

    /* ── Contact ── */
    .card-contact {
      padding: 20px 22px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--white);
    }

    .contact-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 0.85rem;
      transition: opacity 0.18s ease, transform 0.1s ease;
      background: var(--burgundy-pale);
      border: 1.5px solid var(--border);
      color: var(--dark);
      cursor: pointer;
      width: 100%;
      text-align: left;
    }

    .contact-btn:hover { opacity: 0.78; transform: translateY(-1px); }
    .contact-btn:active { transform: translateY(0); }

    .contact-btn-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .contact-btn-label {
      display: flex;
      flex-direction: column;
      gap: 1px;
      flex: 1;
      min-width: 0;
    }

    .contact-btn-type {
      font-size: 0.6rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--burgundy);
      font-weight: 400;
    }

    .contact-btn-value {
      font-family: var(--sans);
      font-size: 0.92rem;
      font-weight: 400;
      color: var(--dark);
    }

    .btn-save {
      background: var(--gold);
      border-color: var(--gold-dark);
      justify-content: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
      font-size: 0.8rem;
    }

    /* ── Footer ── */
    .card-footer {
      padding: 14px 20px;
      text-align: center;
      font-size: 0.62rem;
      letter-spacing: 1px;
      color: var(--burgundy-dark);
      background: var(--burgundy-pale);
      border-top: 1.5px solid var(--border);
      text-transform: uppercase;
    }

    .card-footer a {
      color: var(--burgundy-dark);
      font-weight: 700;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- TOP -->
    <div class="card-top">
      <div class="card-logo-wrap">
        <img src="img/logo.png" alt="Mercado Negro logo">
      </div>
      <p class="card-brand">Mercado Negro</p>
      <h1 class="card-name">Martha Domínguez</h1>
      <p class="card-tagline">Pasteles y delicias artesanales</p>
    </div>

    <!-- STRIP -->
    <div class="card-strip">
      Pasteles &nbsp;·&nbsp; Postres &nbsp;·&nbsp; Antipastos &nbsp;·&nbsp; Charcutería
    </div>

    <!-- CONTACT -->
    <div class="card-contact">

      <a class="contact-btn"
         href="https://wa.me/525657917967"
         target="_blank" rel="noopener noreferrer">
        <svg class="contact-btn-icon" viewBox="0 0 24 24" fill="#6B1A2A" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        <span class="contact-btn-label">
          <span class="contact-btn-type">WhatsApp</span>
          <span class="contact-btn-value">+52 56 5791 7967</span>
        </span>
      </a>

      <a class="contact-btn"
         href="https://www.instagram.com/mercadonegrobymarthadominguez"
         target="_blank" rel="noopener noreferrer">
        <svg class="contact-btn-icon" viewBox="0 0 24 24" fill="none" stroke="#6B1A2A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="#6B1A2A"/>
        </svg>
        <span class="contact-btn-label">
          <span class="contact-btn-type">Instagram</span>
          <span class="contact-btn-value">@mercadonegrobymarthadominguez</span>
        </span>
      </a>

      <button class="contact-btn btn-save" onclick="saveContact()" type="button">
        <svg class="contact-btn-icon" viewBox="0 0 24 24" fill="none" stroke="#1a0a0e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
          <path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        Guardar contacto
      </button>

    </div>

    <!-- FOOTER -->
    <div class="card-footer">
      <a href="https://www.eurekawebsites.tech/" target="_blank" rel="noopener noreferrer">Powered by Eureka Websites</a>
    </div>

  </div>

  <script>
    function saveContact() {
      var vcard = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'FN:Martha Domínguez',
        'N:Domínguez;Martha;;;',
        'ORG:Mercado Negro',
        'TITLE:Pasteles y delicias artesanales',
        'TEL;TYPE=CELL,VOICE:+525657917967',
        'X-SOCIALPROFILE;type=instagram:https://www.instagram.com/mercadonegrobymarthadominguez',
        'END:VCARD'
      ].join('\r\n');

      var blob = new Blob([vcard], { type: 'text/vcard' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'Martha-Dominguez-Mercado-Negro.vcf';
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>

</body>
</html>
